<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversas - Agente IA - RV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind primeiro para reset e utilities -->
    <script nonce="{{ request.state.csp_nonce }}" src="https://cdn.tailwindcss.com"></script>
    <script nonce="{{ request.state.csp_nonce }}" src="/static/tailwind.config.js"></script>
    <!-- Depois global.css e CSS do React -->
    <link rel="stylesheet" href="/static/global.css">
    <link rel="stylesheet" crossorigin href="/conversas/assets/{{ css_file }}">
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .app-layout {
            display: flex;
            height: 100vh;
            /* Allow sidebar to scroll internally, main content handles its own overflow */
        }
        
        .main-content {
            flex: 1;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s ease;
            background: #FFF8F3;
        }
        
        #root {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        
        /* Ensure sidebar can scroll its content */
        #svn-sidebar {
            overflow-y: auto;
            overflow-x: hidden;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        {% include '_sidebar.html' %}

        <main class="main-content" id="mainContent" style="margin-left: 260px;">
            <div id="root"></div>
        </main>
    </div>

    <script nonce="{{ request.state.csp_nonce }}" type="module" crossorigin src="/conversas/assets/{{ js_file }}"></script>
</body>
</html>
