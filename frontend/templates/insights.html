<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights - Agente IA - RV</title>
    <!-- Tailwind CSS CDN -->
    <script nonce="{{ request.state.csp_nonce }}" src="https://cdn.tailwindcss.com"></script>
    <script nonce="{{ request.state.csp_nonce }}" src="/static/tailwind.config.js"></script>
    <!-- Design System SVN -->
    <link rel="stylesheet" href="/static/global.css">
    <script nonce="{{ request.state.csp_nonce }}" src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script nonce="{{ request.state.csp_nonce }}" src="/static/notifications.js?v={{ now().timestamp() if now else 1706371200 }}"></script>
    <style>
        .filters-container {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px 24px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .filters-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .filter-group select,
        .filter-group input[type="date"] {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 0.9rem;
            min-width: 160px;
        }

        .filter-group select:focus,
        .filter-group input[type="date"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .custom-date-inputs {
            display: none;
            gap: 12px;
        }

        .custom-date-inputs.active {
            display: flex;
        }

        .btn-more-filters {
            padding: 10px 16px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-more-filters:hover {
            background: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
        }

        .btn-more-filters svg {
            width: 16px;
            height: 16px;
            transition: transform 0.2s;
        }

        .btn-more-filters.expanded svg {
            transform: rotate(180deg);
        }

        .extra-filters {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .extra-filters.active {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .kpi-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .kpi-icon.brown {
            background: rgba(139, 69, 19, 0.15);
            color: #8b4513;
        }

        .kpi-icon.orange {
            background: rgba(220, 127, 55, 0.15);
            color: #dc7f37;
        }

        .kpi-icon.green {
            background: rgba(107, 142, 35, 0.15);
            color: #6b8e23;
        }

        .kpi-value {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .kpi-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .chart-card h3 {
            color: var(--text-primary);
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .chart-container {
            position: relative;
            height: 280px;
        }

        .campaign-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .campaign-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .campaign-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .campaign-icon.campaigns {
            background: rgba(139, 69, 19, 0.15);
            color: #8b4513;
        }

        .campaign-icon.reached {
            background: rgba(107, 142, 35, 0.15);
            color: #6b8e23;
        }

        .campaign-info h4 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .campaign-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-chart-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 120px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-style: italic;
        }

        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            .charts-grid,
            .campaign-cards {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .kpi-grid {
                grid-template-columns: 1fr;
            }
            
            .filters-row {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-group select,
            .filter-group input[type="date"] {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        {% include '_sidebar.html' %}

        <main class="main-content" id="mainContent" style="margin-left: 260px;">
            <div class="page-container">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Insights</h1>
                        <p class="page-subtitle">Dashboard de métricas e análises de desempenho</p>
                    </div>
                </div>

                <div class="filters-container">
                    <div class="filters-row">
                        <div class="filter-group">
                            <label>Período</label>
                            <select id="filterPeriod">
                                <option value="7d">Últimos 7 dias</option>
                                <option value="30d" selected>Últimos 30 dias</option>
                                <option value="90d">Últimos 90 dias</option>
                                <option value="365d">Último ano</option>
                                <option value="custom">Personalizado</option>
                            </select>
                        </div>
                        <div class="custom-date-inputs" id="customDateInputs">
                            <div class="filter-group">
                                <label>Data Início</label>
                                <input type="date" id="filterStartDate">
                            </div>
                            <div class="filter-group">
                                <label>Data Fim</label>
                                <input type="date" id="filterEndDate">
                            </div>
                        </div>
                        <div class="filter-group">
                            <label>Macro Área</label>
                            <select id="filterMacroArea">
                                <option value="">Todas</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Unidade</label>
                            <select id="filterUnidade">
                                <option value="">Todas</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Broker</label>
                            <select id="filterBroker">
                                <option value="">Todos</option>
                            </select>
                        </div>
                        <button class="btn-more-filters" id="btnMoreFilters">
                            <span>Mais Filtros</span>
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </button>
                        <button class="btn btn-primary" id="btnApplyFilters">Aplicar</button>
                    </div>
                    <div class="extra-filters" id="extraFilters">
                        <div class="filter-group">
                            <label>Equipe</label>
                            <select id="filterEquipe">
                                <option value="">Todas</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="kpi-grid">
                    <div class="kpi-card">
                        <div class="kpi-icon brown">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                        </div>
                        <div class="kpi-value" id="kpiInteractions">-</div>
                        <div class="kpi-label">Conversas (jan. 12h)</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-icon orange">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        </div>
                        <div class="kpi-value" id="kpiAssessors">-</div>
                        <div class="kpi-label">Assessores Ativos</div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-icon green">
                            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        </div>
                        <div class="kpi-value" id="kpiResolution">-</div>
                        <div class="kpi-label">Taxa de Resolução IA (%)</div>
                    </div>
                </div>

                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>Atividade Diária</h3>
                        <div class="chart-container">
                            <canvas id="activityChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <h3>Categorias de Dúvidas</h3>
                        <div class="chart-container">
                            <canvas id="categoriesChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>Produtos em Alta</h3>
                        <div class="chart-container">
                            <canvas id="productsChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <h3>IA vs Humanos</h3>
                        <div class="chart-container">
                            <canvas id="resolutionChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="campaign-cards">
                    <div class="campaign-card">
                        <div class="campaign-icon campaigns">
                            <svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/></svg>
                        </div>
                        <div class="campaign-info">
                            <h4 id="campaignsTotal">-</h4>
                            <p>Campanhas Disparadas</p>
                        </div>
                    </div>
                    <div class="campaign-card">
                        <div class="campaign-icon reached">
                            <svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        </div>
                        <div class="campaign-info">
                            <h4 id="assessorsReached">-</h4>
                            <p>Assessores Alcançados</p>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script nonce="{{ request.state.csp_nonce }}" src="/static/sidebar.js"></script>
    <script nonce="{{ request.state.csp_nonce }}">
        let activityChart = null;
        let categoriesChart = null;
        let productsChart = null;
        let resolutionChart = null;

        const chartColors = {
            brown: '#8b4513',
            orange: '#dc7f37',
            green: '#6b8e23',
            brownLight: 'rgba(139, 69, 19, 0.2)',
            orangeLight: 'rgba(220, 127, 55, 0.2)',
            greenLight: 'rgba(107, 142, 35, 0.2)',
            palette: ['#8b4513', '#dc7f37', '#6b8e23', '#b8860b', '#cd853f', '#556b2f', '#d2691e', '#8fbc8f', '#a0522d', '#9acd32']
        };

        function setChartEmpty(canvasId, message) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            canvas.style.display = 'none';
            let el = document.getElementById(canvasId + '-empty');
            if (!el) {
                el = document.createElement('div');
                el.id = canvasId + '-empty';
                el.className = 'empty-chart-state';
                canvas.parentNode.insertBefore(el, canvas.nextSibling);
            }
            el.textContent = message || 'Sem dados no período';
            el.style.display = 'flex';
        }

        function clearChartEmpty(canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            canvas.style.display = 'block';
            const el = document.getElementById(canvasId + '-empty');
            if (el) el.style.display = 'none';
        }

        function logout() {
            fetch('/api/auth/logout', { method: 'POST' })
                .then(() => window.location.href = '/login')
                .catch(() => window.location.href = '/login');
        }

        function getFilterParams() {
            const period = document.getElementById('filterPeriod').value;
            const params = new URLSearchParams();
            
            if (period === 'custom') {
                const startDate = document.getElementById('filterStartDate').value;
                const endDate = document.getElementById('filterEndDate').value;
                if (startDate) params.append('start_date', startDate);
                if (endDate) params.append('end_date', endDate);
            } else {
                params.append('period', period);
            }
            
            const macroArea = document.getElementById('filterMacroArea').value;
            const unidade = document.getElementById('filterUnidade').value;
            const broker = document.getElementById('filterBroker').value;
            const equipe = document.getElementById('filterEquipe').value;
            
            if (macroArea) params.append('macro_area', macroArea);
            if (unidade) params.append('unidade', unidade);
            if (broker) params.append('broker', broker);
            if (equipe) params.append('equipe', equipe);
            
            return params.toString();
        }

        function handlePeriodChange() {
            const period = document.getElementById('filterPeriod').value;
            const customInputs = document.getElementById('customDateInputs');
            
            if (period === 'custom') {
                customInputs.classList.add('active');
            } else {
                customInputs.classList.remove('active');
            }
        }

        function toggleMoreFilters() {
            const btn = document.getElementById('btnMoreFilters');
            const extra = document.getElementById('extraFilters');
            
            btn.classList.toggle('expanded');
            extra.classList.toggle('active');
        }

        async function loadFilters() {
            try {
                const response = await fetch('/api/insights/filters');
                if (!response.ok) throw new Error('Erro ao carregar filtros');
                
                const data = await response.json();
                
                const macroAreaSelect = document.getElementById('filterMacroArea');
                data.macro_areas.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item;
                    option.textContent = item;
                    macroAreaSelect.appendChild(option);
                });
                
                const unidadeSelect = document.getElementById('filterUnidade');
                data.unidades.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item;
                    option.textContent = item;
                    unidadeSelect.appendChild(option);
                });
                
                const brokerSelect = document.getElementById('filterBroker');
                data.brokers.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item;
                    option.textContent = item;
                    brokerSelect.appendChild(option);
                });
                
                const equipeSelect = document.getElementById('filterEquipe');
                data.equipes.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item;
                    option.textContent = item;
                    equipeSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Erro ao carregar filtros:', error);
            }
        }

        async function loadDashboard() {
            const params = getFilterParams();
            
            await Promise.all([
                loadMetrics(params),
                loadActivityChart(params),
                loadCategoriesChart(params),
                loadProductsChart(params),
                loadResolutionChart(params)
            ]);
        }

        async function loadMetrics(params) {
            try {
                const response = await fetch(`/api/insights/metrics?${params}`);
                if (!response.ok) throw new Error('Erro ao carregar métricas');
                
                const data = await response.json();
                
                document.getElementById('kpiInteractions').textContent = data.total_interactions.toLocaleString('pt-BR');
                document.getElementById('kpiAssessors').textContent = data.active_assessors.toLocaleString('pt-BR');
                document.getElementById('kpiResolution').textContent = data.ai_resolution_rate + '%';
                document.getElementById('campaignsTotal').textContent = data.total_campaigns.toLocaleString('pt-BR');
                document.getElementById('assessorsReached').textContent = data.total_assessors_reached.toLocaleString('pt-BR');
            } catch (error) {
                console.error('Erro ao carregar métricas:', error);
            }
        }

        async function loadActivityChart(params) {
            try {
                const response = await fetch(`/api/insights/activity?${params}`);
                if (!response.ok) throw new Error('Erro ao carregar atividade');
                
                const data = await response.json();
                
                if (!data.labels || data.labels.length === 0) {
                    setChartEmpty('activityChart', 'Sem interações no período');
                    return;
                }
                clearChartEmpty('activityChart');

                const ctx = document.getElementById('activityChart').getContext('2d');
                
                if (activityChart) activityChart.destroy();
                
                activityChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.labels.map(d => {
                            const date = new Date(d);
                            return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
                        }),
                        datasets: [{
                            label: 'Interações',
                            data: data.data,
                            borderColor: chartColors.brown,
                            backgroundColor: chartColors.brownLight,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 3,
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { precision: 0 }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Erro ao carregar gráfico de atividade:', error);
            }
        }

        async function loadCategoriesChart(params) {
            try {
                const response = await fetch(`/api/insights/categories?${params}`);
                if (!response.ok) throw new Error('Erro ao carregar categorias');
                
                const data = await response.json();
                
                if (!data.labels || data.labels.length === 0) {
                    setChartEmpty('categoriesChart', 'Sem categorias no período');
                    return;
                }
                clearChartEmpty('categoriesChart');

                const ctx = document.getElementById('categoriesChart').getContext('2d');
                
                if (categoriesChart) categoriesChart.destroy();
                
                categoriesChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: data.labels,
                        datasets: [{
                            data: data.data,
                            backgroundColor: chartColors.palette,
                            borderWidth: 2,
                            borderColor: '#fff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'right',
                                labels: { boxWidth: 12, padding: 12 }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Erro ao carregar gráfico de categorias:', error);
            }
        }

        async function loadProductsChart(params) {
            try {
                const response = await fetch(`/api/insights/products?${params}`);
                if (!response.ok) throw new Error('Erro ao carregar produtos');
                
                const data = await response.json();
                
                if (!data.labels || data.labels.length === 0) {
                    setChartEmpty('productsChart', 'Nenhum produto mencionado no período');
                    return;
                }
                clearChartEmpty('productsChart');

                const ctx = document.getElementById('productsChart').getContext('2d');
                
                if (productsChart) productsChart.destroy();
                
                productsChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.labels,
                        datasets: [{
                            label: 'Menções',
                            data: data.data,
                            backgroundColor: chartColors.orange,
                            borderRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { precision: 0 }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Erro ao carregar gráfico de produtos:', error);
            }
        }

        async function loadResolutionChart(params) {
            try {
                const response = await fetch(`/api/insights/resolution?${params}`);
                if (!response.ok) throw new Error('Erro ao carregar resolução');
                
                const data = await response.json();

                const hasResolutionData = data.data && data.data.some(v => v > 0);
                if (!hasResolutionData) {
                    setChartEmpty('resolutionChart', 'Sem dados de resolução no período');
                    return;
                }
                clearChartEmpty('resolutionChart');
                
                const ctx = document.getElementById('resolutionChart').getContext('2d');
                
                if (resolutionChart) resolutionChart.destroy();
                
                resolutionChart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: data.labels,
                        datasets: [{
                            data: data.data,
                            backgroundColor: [chartColors.green, chartColors.brown],
                            borderWidth: 2,
                            borderColor: '#fff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: { boxWidth: 12, padding: 16 }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Erro ao carregar gráfico de resolução:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadFilters();
            loadDashboard();

            document.getElementById('filterPeriod').addEventListener('change', function() { handlePeriodChange(); });
            document.getElementById('btnMoreFilters').addEventListener('click', function() { toggleMoreFilters(); });
            document.getElementById('btnApplyFilters').addEventListener('click', function() { loadDashboard(); });
        });
    </script>
</body>
</html>
