<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamados - Agente IA - RV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/global.css">
    <script src="/static/notifications.js?v={{ now().timestamp() if now else 1706371200 }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        .kanban-container {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            padding-bottom: 24px;
        }

        .kanban-column {
            background: var(--card-bg);
            border-radius: 16px;
            min-width: 320px;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-color);
        }

        .column-header {
            padding: 16px 20px;
            font-weight: 600;
            font-size: 0.95rem;
            border-bottom: 3px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-color);
            border-radius: 16px 16px 0 0;
        }

        .column-header .count {
            background: var(--card-bg);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid var(--border-color);
        }

        .column-open .column-header {
            color: #dc2626;
            border-bottom-color: #dc2626;
        }

        .column-progress .column-header {
            color: #d97706;
            border-bottom-color: #d97706;
        }

        .column-closed .column-header {
            color: #059669;
            border-bottom-color: #059669;
        }

        .column-content {
            padding: 16px;
            flex: 1;
            overflow-y: auto;
            min-height: 300px;
        }

        .ticket-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .ticket-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }

        .ticket-card.sortable-ghost {
            opacity: 0.4;
        }

        .ticket-card.sortable-drag {
            cursor: grabbing;
        }

        .ticket-id {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .ticket-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .ticket-description {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .ticket-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .btn-new-ticket {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(119, 43, 33, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-new-ticket:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 24px rgba(119, 43, 33, 0.4);
        }

        .empty-column {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        {% include '_sidebar.html' %}

        <main class="main-content" id="mainContent">
            <div class="page-container">
                <div class="page-header">
                    <h1 class="page-title">Chamados</h1>
                    <p class="page-subtitle">Gerencie os chamados arrastando entre as colunas</p>
                </div>

                <div class="kanban-container">
                    <div class="kanban-column column-open">
                        <div class="column-header">
                            <span>Aberto</span>
                            <span class="count" id="count-open">0</span>
                        </div>
                        <div class="column-content" id="column-open" data-status="Aberto"></div>
                    </div>
                    
                    <div class="kanban-column column-progress">
                        <div class="column-header">
                            <span>Em Andamento</span>
                            <span class="count" id="count-progress">0</span>
                        </div>
                        <div class="column-content" id="column-progress" data-status="Em Andamento"></div>
                    </div>
                    
                    <div class="kanban-column column-closed">
                        <div class="column-header">
                            <span>Concluído</span>
                            <span class="count" id="count-closed">0</span>
                        </div>
                        <div class="column-content" id="column-closed" data-status="Concluído"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <button class="btn-new-ticket" onclick="openModal()">+</button>
    
    <div class="modal-overlay" id="ticketModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Novo Chamado</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="ticketForm" onsubmit="createTicket(event)">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label" for="title">Título</label>
                        <input type="text" class="form-input" id="title" name="title" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="description">Descrição</label>
                        <textarea class="form-textarea" id="description" name="description"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="client_phone">Telefone do Cliente</label>
                        <input type="text" class="form-input" id="client_phone" name="client_phone" placeholder="5511999999999">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Criar Chamado</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            sidebar.classList.toggle('collapsed');
            if (sidebar.classList.contains('collapsed')) {
                mainContent.style.marginLeft = 'var(--sidebar-collapsed)';
            } else {
                mainContent.style.marginLeft = 'var(--sidebar-width)';
            }
            localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('sidebarCollapsed') === 'true') {
                document.getElementById('sidebar').classList.add('collapsed');
                document.getElementById('mainContent').style.marginLeft = 'var(--sidebar-collapsed)';
            }
            loadTickets();
        });
        
        async function loadTickets() {
            try {
                const response = await fetch('/api/tickets/');
                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                
                const tickets = await response.json();
                
                document.getElementById('column-open').innerHTML = '';
                document.getElementById('column-progress').innerHTML = '';
                document.getElementById('column-closed').innerHTML = '';
                
                let countOpen = 0, countProgress = 0, countClosed = 0;
                
                tickets.forEach(ticket => {
                    const card = createTicketCard(ticket);
                    
                    switch(ticket.status) {
                        case 'Aberto':
                            document.getElementById('column-open').appendChild(card);
                            countOpen++;
                            break;
                        case 'Em Andamento':
                            document.getElementById('column-progress').appendChild(card);
                            countProgress++;
                            break;
                        case 'Concluído':
                            document.getElementById('column-closed').appendChild(card);
                            countClosed++;
                            break;
                    }
                });
                
                document.getElementById('count-open').textContent = countOpen;
                document.getElementById('count-progress').textContent = countProgress;
                document.getElementById('count-closed').textContent = countClosed;
                
                initSortable();
                
            } catch (error) {
                console.error('Erro ao carregar tickets:', error);
            }
        }
        
        function createTicketCard(ticket) {
            const card = document.createElement('div');
            card.className = 'ticket-card';
            card.dataset.id = ticket.id;
            
            const date = ticket.created_at ? new Date(ticket.created_at).toLocaleDateString('pt-BR') : '';
            
            card.innerHTML = `
                <div class="ticket-id">#${ticket.id}</div>
                <div class="ticket-title">${ticket.title}</div>
                <div class="ticket-description">${ticket.description || 'Sem descrição'}</div>
                <div class="ticket-footer">
                    <div>${ticket.client_phone || 'N/A'}</div>
                    <div>${date}</div>
                </div>
            `;
            
            return card;
        }
        
        function initSortable() {
            const columns = document.querySelectorAll('.column-content');
            
            columns.forEach(column => {
                new Sortable(column, {
                    group: 'tickets',
                    animation: 150,
                    ghostClass: 'sortable-ghost',
                    dragClass: 'sortable-drag',
                    onEnd: async function(evt) {
                        const ticketId = evt.item.dataset.id;
                        const newStatus = evt.to.dataset.status;
                        
                        try {
                            await fetch(`/api/tickets/${ticketId}/status`, {
                                method: 'PATCH',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({ status: newStatus })
                            });
                            
                            loadTickets();
                        } catch (error) {
                            console.error('Erro ao atualizar status:', error);
                            loadTickets();
                        }
                    }
                });
            });
        }
        
        function openModal() {
            document.getElementById('ticketModal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('ticketModal').classList.remove('show');
            document.getElementById('ticketForm').reset();
        }
        
        async function createTicket(event) {
            event.preventDefault();
            
            const formData = new FormData(event.target);
            const data = {
                title: formData.get('title'),
                description: formData.get('description'),
                client_phone: formData.get('client_phone') || null
            };
            
            try {
                const response = await fetch('/api/tickets/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    closeModal();
                    loadTickets();
                } else {
                    toast.error('Erro ao criar chamado');
                }
            } catch (error) {
                console.error('Erro ao criar chamado:', error);
                toast.error('Erro ao criar chamado');
            }
        }
        
        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login';
        }
        
        document.getElementById('ticketModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
