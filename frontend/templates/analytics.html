<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Agente IA - RV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/global.css">
    <style>
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .kpi-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 1.4rem;
        }

        .kpi-value {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .kpi-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
        }

        .chart-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .chart-card h3 {
            color: var(--text-primary);
            margin-bottom: 24px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .category-bar {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            gap: 16px;
        }

        .category-name {
            width: 120px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .category-bar-container {
            flex: 1;
            height: 28px;
            background: var(--bg-color);
            border-radius: 14px;
            overflow: hidden;
        }

        .category-bar-fill {
            height: 100%;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
            min-width: 40px;
            transition: width 0.5s ease;
        }

        .category-count {
            font-size: 0.8rem;
            font-weight: 600;
            color: #fff;
        }

        .broker-table {
            width: 100%;
            border-collapse: collapse;
        }

        .broker-table th,
        .broker-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .broker-table th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .broker-table td {
            color: var(--text-primary);
        }

        .broker-table tr:hover {
            background: var(--bg-color);
        }

        .time-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .time-good {
            background: #d1fae5;
            color: #065f46;
        }

        .time-medium {
            background: #fef3c7;
            color: #92400e;
        }

        .time-bad {
            background: #fee2e2;
            color: #991b1b;
        }

        .date-filters {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .date-filters label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .date-filters input[type="date"] {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .quick-filters {
            display: flex;
            gap: 8px;
        }

        .quick-filter {
            padding: 6px 14px;
            background: var(--bg-color);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .quick-filter:hover, .quick-filter.active {
            background: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        {% include '_sidebar.html' %}

        <main class="main-content" id="mainContent">
            <div class="page-container">
                <div class="header-actions">
                    <div class="page-header" style="margin-bottom: 0;">
                        <h1 class="page-title">Painel de Gestão</h1>
                        <p class="page-subtitle">Acompanhe os indicadores de desempenho</p>
                    </div>
                    <div class="date-filters">
                        <div class="quick-filters">
                            <button class="quick-filter" data-period="7">7 dias</button>
                            <button class="quick-filter" data-period="30">30 dias</button>
                            <button class="quick-filter" data-period="90">90 dias</button>
                            <button class="quick-filter active" data-period="all">Todos</button>
                        </div>
                        <label>De:</label>
                        <input type="date" id="startDate">
                        <label>Até:</label>
                        <input type="date" id="endDate">
                        <button class="btn btn-primary" onclick="loadAllData()">Filtrar</button>
                    </div>
                </div>

                <div class="kpi-grid" id="kpiGrid">
                    <div class="loading"><div class="spinner"></div></div>
                </div>

                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>Volume de Dúvidas por Categoria</h3>
                        <div id="categoriesChart">
                            <div class="loading"><div class="spinner"></div></div>
                        </div>
                    </div>

                    <div class="chart-card">
                        <h3>Tempo Médio de Resolução por Broker</h3>
                        <div id="resolutionTable">
                            <div class="loading"><div class="spinner"></div></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = '/api/analytics';

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            sidebar.classList.toggle('collapsed');
            if (sidebar.classList.contains('collapsed')) {
                mainContent.style.marginLeft = 'var(--sidebar-collapsed)';
            } else {
                mainContent.style.marginLeft = 'var(--sidebar-width)';
            }
            localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('sidebarCollapsed') === 'true') {
                document.getElementById('sidebar').classList.add('collapsed');
                document.getElementById('mainContent').style.marginLeft = 'var(--sidebar-collapsed)';
            }
        });
        
        function getDateParams() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const params = new URLSearchParams();
            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);
            return params.toString() ? '?' + params.toString() : '';
        }

        async function loadSummary() {
            try {
                const response = await fetch(`${API_BASE}/summary${getDateParams()}`, {
                    credentials: 'include'
                });
                
                if (!response.ok) throw new Error('Erro ao carregar dados');
                
                const data = await response.json();
                renderKPIs(data);
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('kpiGrid').innerHTML = `
                    <div class="empty-state">
                        <p>Erro ao carregar indicadores</p>
                    </div>
                `;
            }
        }

        function renderKPIs(data) {
            const kpis = [
                { key: 'total_atendimentos', label: 'Total de Atendimentos', icon: '💬', color: '#772B21' },
                { key: 'chamados_abertos', label: 'Chamados Abertos', icon: '📋', color: '#f59e0b' },
                { key: 'chamados_concluidos', label: 'Chamados Concluídos', icon: '✅', color: '#10b981' },
                { key: 'mensagens_enviadas', label: 'Mensagens Enviadas', icon: '📨', color: '#3b82f6' },
                { key: 'assessores_unicos_impactados', label: 'Assessores Impactados', icon: '👥', color: '#8b5cf6' },
            ];

            const html = kpis.map(kpi => `
                <div class="kpi-card">
                    <div class="kpi-icon" style="background: ${kpi.color}15;">
                        ${kpi.icon}
                    </div>
                    <div class="kpi-value">${data[kpi.key] || 0}</div>
                    <div class="kpi-label">${kpi.label}</div>
                </div>
            `).join('');

            document.getElementById('kpiGrid').innerHTML = html;
        }

        async function loadCategories() {
            try {
                const response = await fetch(`${API_BASE}/tickets-by-category${getDateParams()}`, {
                    credentials: 'include'
                });
                
                if (!response.ok) throw new Error('Erro ao carregar categorias');
                
                const data = await response.json();
                renderCategories(data.categories);
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('categoriesChart').innerHTML = `
                    <div class="empty-state">
                        <p>Erro ao carregar categorias</p>
                    </div>
                `;
            }
        }

        function renderCategories(categories) {
            if (!categories || categories.length === 0) {
                document.getElementById('categoriesChart').innerHTML = `
                    <div class="empty-state">
                        <p>Nenhuma categoria encontrada</p>
                        <p style="font-size: 0.85rem; color: var(--text-secondary);">As categorias serão exibidas quando houver tickets classificados</p>
                    </div>
                `;
                return;
            }

            const maxCount = Math.max(...categories.map(c => c.count), 1);
            
            const html = categories.map(cat => {
                const width = Math.max((cat.count / maxCount) * 100, 15);
                return `
                    <div class="category-bar">
                        <span class="category-name">${cat.category_name}</span>
                        <div class="category-bar-container">
                            <div class="category-bar-fill" style="width: ${width}%; background: ${cat.color};">
                                <span class="category-count">${cat.count}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('categoriesChart').innerHTML = html;
        }

        async function loadResolutionTime() {
            try {
                const response = await fetch(`${API_BASE}/resolution-time${getDateParams()}`, {
                    credentials: 'include'
                });
                
                if (!response.ok) throw new Error('Erro ao carregar tempos');
                
                const data = await response.json();
                renderResolutionTable(data.brokers);
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('resolutionTable').innerHTML = `
                    <div class="empty-state">
                        <p>Erro ao carregar dados</p>
                    </div>
                `;
            }
        }

        function renderResolutionTable(brokers) {
            if (!brokers || brokers.length === 0) {
                document.getElementById('resolutionTable').innerHTML = `
                    <div class="empty-state">
                        <p>Nenhum broker com chamados resolvidos</p>
                        <p style="font-size: 0.85rem; color: var(--text-secondary);">Os tempos serão calculados quando houver chamados finalizados</p>
                    </div>
                `;
                return;
            }

            const getTimeBadgeClass = (hours) => {
                if (hours <= 24) return 'time-good';
                if (hours <= 72) return 'time-medium';
                return 'time-bad';
            };

            const formatTime = (hours) => {
                if (hours < 1) return '< 1 hora';
                if (hours < 24) return `${Math.round(hours)} horas`;
                const days = Math.round(hours / 24 * 10) / 10;
                return `${days} dias`;
            };

            const html = `
                <table class="broker-table">
                    <thead>
                        <tr>
                            <th>Broker</th>
                            <th>Chamados Resolvidos</th>
                            <th>Tempo Médio</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${brokers.map(broker => `
                            <tr>
                                <td>${broker.broker_name}</td>
                                <td>${broker.total_tickets}</td>
                                <td>
                                    <span class="time-badge ${getTimeBadgeClass(broker.avg_resolution_hours)}">
                                        ${formatTime(broker.avg_resolution_hours)}
                                    </span>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            document.getElementById('resolutionTable').innerHTML = html;
        }

        function loadAllData() {
            loadSummary();
            loadCategories();
            loadResolutionTime();
        }

        document.querySelectorAll('.quick-filter').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.quick-filter').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const period = this.dataset.period;
                const endDate = new Date();
                const startDate = new Date();
                
                if (period === 'all') {
                    document.getElementById('startDate').value = '';
                    document.getElementById('endDate').value = '';
                } else {
                    startDate.setDate(endDate.getDate() - parseInt(period));
                    document.getElementById('startDate').value = startDate.toISOString().split('T')[0];
                    document.getElementById('endDate').value = endDate.toISOString().split('T')[0];
                }
                
                loadAllData();
            });
        });

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        document.addEventListener('DOMContentLoaded', loadAllData);
    </script>
</body>
</html>
