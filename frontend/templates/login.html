<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agente IA - RV</title>
    <link rel="stylesheet" href="/static/global.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-color);
        }
        
        .login-container {
            background: var(--card-bg);
            padding: 48px;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border-color);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 36px;
        }
        
        .logo img {
            height: 52px;
            margin-bottom: 16px;
        }
        
        .logo h1 {
            color: var(--text-primary);
            font-size: 1.75rem;
            font-weight: 700;
        }
        
        .logo p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 8px;
        }
        
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .footer {
            text-align: center;
            margin-top: 28px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="/static/logo.png" alt="SVN">
            <h1>Agente IA - RV</h1>
            <p>Painel Administrativo</p>
        </div>
        
        <div class="error-message" id="error-message">
            Usuário ou senha incorretos. Tente novamente.
        </div>
        
        <form action="/api/auth/login-form" method="POST">
            <div class="form-group">
                <label class="form-label" for="username">Usuário</label>
                <input type="text" class="form-input" id="username" name="username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Senha</label>
                <input type="password" class="form-input" id="password" name="password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 1rem;">Entrar</button>
        </form>
        
        <div class="footer">
            Acesso restrito a administradores e assessores
        </div>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            const errorEl = document.getElementById('error-message');
            if (urlParams.get('error') === 'permission') {
                errorEl.textContent = 'Você não tem permissão para acessar o painel.';
            }
            errorEl.classList.add('show');
        }
    </script>
</body>
</html>
