name: Structure Guard Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  structure-guard:
    name: Anti-capture structure guard suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpq-dev libmagic1 poppler-utils ghostscript \
            libcairo2-dev libfreetype6-dev libjpeg-dev libpng-dev \
            libtiff-dev libwebp-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run structure guard suite
        run: pytest tests/test_structure_guard.py -v
